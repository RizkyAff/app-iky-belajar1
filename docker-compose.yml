services:
  app:
    build: .
    container_name: app-iky
    restart: always
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: nginx-iky
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

  prometheus:
    image: prom/prometheus
    container_name: prometheus-iky
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter-iky
    ports:
      - "9100:9100"
    restart: always
    pid: "host"
    volumes:
      - "/:/host:ro,rslave"
    command:
      - "--path.rootfs=/host"
