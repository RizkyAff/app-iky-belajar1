version: '3'

services:
  app:
    image: 10.0.2.13:5000/app-rizky:latest
    container_name: app-rizky
    restart: always
    ports:
      - "3000:3000"

  nginx:
    image: 10.0.2.13:5000/nginx:latest
    container_name: nginx-iky
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

  node-exporter:
    image: 10.0.2.13:5000/node-exporter:latest
    container_name: node-exporter-iky
    ports:
      - "9100:9100"
    restart: always
    pid: "host"
    volumes:
      - "/:/host:ro,rslave"
    command:
      - "--path.rootfs=/host"